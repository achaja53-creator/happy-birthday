<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 Seseorang Menitipkan Sesuatu...</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Langit -->
    <div id="stars"></div>

    <!-- Opening -->
    <section id="opening" class="page active">

        <h1 id="openingTitle">
            Ada seseorang yang ingin menyampaikan sesuatu...
        </h1>

        <p>
            Sebuah hadiah kecil yang dibuat
            dengan waktu, usaha, dan ketulusan.
        </p>

        <button id="startBtn">
             Mulai
        </button>

    </section>

    <!-- Intro -->
    <section id="intro" class="page">

        <h1 id="introTitle"></h1>

        <p id="introText"></p>

    </section>

    <!-- Surat -->
    <section id="letterPage" class="page">

        <div id="letterBox">

            <h2>💌 Untuk Heni</h2>

            <p id="letterText"></p>

        </div>

    </section>

    <!-- Ending -->
    <section id="ending" class="page">

        <h1 id="endingTitle"></h1>

        <p id="endingText"></p>

        <button id="restartBtn">
            🤍 Putar Lagi
        </button>

    </section>

    <!-- Musik (opsional) -->
    <audio id="music" loop>
        <source src="monokrom.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>
</html>
